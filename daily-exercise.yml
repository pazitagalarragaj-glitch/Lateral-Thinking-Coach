name: Daily Lateral Thinking Exercise

on:
  schedule:
    # Runs at 06:00 UTC daily. GitHub cron is always UTC.
    # Milan is UTC+2 in summer / UTC+1 in winter, so this lands ~07:00-08:00 local.
    # Adjust the numbers to your preferred send time.
    - cron: "0 6 * * *"
  workflow_dispatch:   # lets you trigger it manually from the Actions tab to test

jobs:
  send-exercise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Send today's exercise
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python daily_lateral_bot.py
