name: Daily Lateral Thinking Exercise

on:
  schedule:
    # Runs at 07:30 UTC daily (~9:30am Milan in summer). GitHub cron is always UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:   # lets you trigger it manually from the Actions tab to test

jobs:
  send-exercise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Send today's exercise
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python daily_lateral_bot.py
